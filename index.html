    <style>
        :root {

        }

        body {

            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        nav {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        nav h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        main {
            margin-left: 260px;
            padding: 3rem;
            width: 100%;
            max-width: 1100px;
        }

        .section { display: none; }
        .section.active { display: block; }

        .search-bar {
            width: 100%;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 2rem;
        }

        .vocab-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .vocab-card h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            display: block;
            margin-top: 1rem;
        }

        .example-box {
            background: rgba(88, 166, 255, 0.05);
            border-left: 3px solid var(--accent);
            padding: 1rem;
            margin-top: 1rem;
            font-style: italic;
        }

        .q-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .q-number {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .scenario {
            line-height: 1.65;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .question-line {
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .option {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-top: 0.6rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .option:hover {
            border-color: var(--accent);
        }

        .option.correct {
            background: var(--correct);
            border-color: var(--correct);
        }

        .option.wrong {
            background: var(--wrong);
            border-color: var(--wrong);
        }

        .answer-block {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid var(--border);
        }

        .answer-block strong {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            nav {
                width: 100%;
                height: auto;
                position: relative;
            }

            main {
                margin-left: 0;
                padding: 1.5rem;
            }

            body {
                flex-direction: column;
            }
        }
    </style>
</head>

];

function showTab(id, el) {
    document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

function renderVocab() {
    const container = document.getElementById('vocab-container');
    container.innerHTML = vocabData.map(item => `
        <div class="vocab-card">
            <h3>${item.term}</h3>
            <span class="label">Exact Definition</span>
            <p>${item.exact}</p>
            <span class="label">Simple Definition</span>
            <p>${item.simple}</p>
            <div class="example-box">
                <span class="label" style="margin-top:0">Example</span>
                ${item.example}
            </div>
        </div>
    `).join('');
}

function filterVocab() {
    const query = document.getElementById('search').value.toLowerCase();
    const cards = document.querySelectorAll('.vocab-card');
    cards.forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(query) ? 'block' : 'none';
    });
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = quizData.map((item, i) => `
        <div class="q-card" id="q${i}">
            <div class="q-number">${i + 1}.</div>
            <p class="scenario">${item.scenario}</p>
            <p class="question-line">${item.question}</p>
            ${item.options.map((opt, oi) => `
                <button class="option" onclick="checkAnswer(${i}, ${oi})">${opt}</button>
            `).join('')}
            <div class="answer-block" id="exp${i}">
                <p><strong>Correct answer:</strong> ${String.fromCharCode(65 + item.correct)}</p>
                <p><strong>Explanation:</strong> ${item.explanation}</p>
            </div>
        </div>
    `).join('');
}

function checkAnswer(qIdx, oIdx) {
    const q = quizData[qIdx];
    const card = document.getElementById(`q${qIdx}`);
    const options = card.querySelectorAll('.option');
    const exp = document.getElementById(`exp${qIdx}`);

    options.forEach(btn => btn.disabled = true);

    if (oIdx === q.correct) {
        options[oIdx].classList.add('correct');
        exp.style.background = "rgba(35, 134, 54, 0.12)";
    } else {
        options[oIdx].classList.add('wrong');
        options[q.correct].classList.add('correct');
        exp.style.background = "rgba(218, 54, 51, 0.12)";
    }

    exp.style.display = "block";
}

renderVocab();
renderQuiz();
</script>

</body>
</html>

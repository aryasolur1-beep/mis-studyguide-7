<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIS Chapter 7 Study Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0E14;
            --surface: #161B22;
            --accent: #58A6FF;
            --text-main: #E6EDF3;
            --text-dim: #8B949E;
            --correct: #238636;
            --wrong: #DA3633;
            --border: #30363D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        nav {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        nav h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        main {
            margin-left: 260px;
            padding: 3rem;
            width: 100%;
            max-width: 1100px;
        }

        .section { display: none; }
        .section.active { display: block; }

        .search-bar {
            width: 100%;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 2rem;
        }

        .vocab-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .vocab-card h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            display: block;
            margin-top: 1rem;
        }

        .example-box {
            background: rgba(88, 166, 255, 0.05);
            border-left: 3px solid var(--accent);
            padding: 1rem;
            margin-top: 1rem;
            font-style: italic;
        }

        .q-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .q-number {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .scenario {
            line-height: 1.65;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .question-line {
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .option {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-top: 0.6rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .option:hover {
            border-color: var(--accent);
        }

        .option.correct {
            background: var(--correct);
            border-color: var(--correct);
        }

        .option.wrong {
            background: var(--wrong);
            border-color: var(--wrong);
        }

        .answer-block {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid var(--border);
        }

        .answer-block strong {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            nav {
                width: 100%;
                height: auto;
                position: relative;
            }

            main {
                margin-left: 0;
                padding: 1.5rem;
            }

            body {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<nav>
    <h1>MIS Chapter 7</h1>
    <button class="nav-btn active" onclick="showTab('vocab', this)">Terms</button>
    <button class="nav-btn" onclick="showTab('quiz', this)">Practice Quiz</button>
    <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-dim); line-height: 1.5;">
        Focus: software, enterprise systems, databases, middleware, distributed computing, and interfaces.
    </div>
</nav>

<main>
    <section id="vocab" class="section active">
        <input type="text" class="search-bar" id="search" placeholder="Search Chapter 7 terms..." onkeyup="filterVocab()">
        <div id="vocab-container"></div>
    </section>

    <section id="quiz" class="section">
        <div id="quiz-container"></div>
    </section>
</main>

<script>
const vocabData = [
    {
        term: "Application",
        exact: "Software that performs a specific task for users or organizations, such as creating documents, processing sales, or managing records.",
        simple: "A program that helps people do a job or complete a task.",
        example: "A student uses Excel to track club expenses. Excel is the application doing the work."
    },
    {
        term: "Business Intelligence (BI) systems",
        exact: "Information systems that collect, process, and present data to help managers analyze performance and make decisions.",
        simple: "Systems that turn data into useful reports and dashboards.",
        example: "A retail manager uses a dashboard to compare weekly sales, returns, and profit by store."
    },
    {
        term: "Customer relationship management (CRM) systems",
        exact: "Systems that manage a company's interactions with current and potential customers across marketing, sales, and service.",
        simple: "Systems that help a business track and improve customer relationships.",
        example: "A small business stores customer contacts, purchase history, and support requests in one CRM."
    },
    {
        term: "Database management system (DBMS)",
        exact: "Software that creates, stores, organizes, secures, and retrieves data from databases.",
        simple: "Software that manages data in a database.",
        example: "A university app pulls student records from a database that is controlled by a DBMS."
    },
    {
        term: "Distributed computing",
        exact: "A model in which computing work is spread across multiple computers or devices that coordinate over a network.",
        simple: "Many computers working together on one larger job.",
        example: "A streaming service uses many servers in different places so users can watch videos smoothly."
    },
    {
        term: "Enterprise resource planning (ERP) systems",
        exact: "Integrated systems that connect major business processes such as accounting, operations, inventory, and HR into one shared platform.",
        simple: "A system that links core parts of a business together.",
        example: "When a sale is made, inventory, accounting, and purchasing are updated inside the same ERP."
    },
    {
        term: "Konana's Model of the Software Ecosystem",
        exact: "A model that explains software as part of a broader ecosystem of users, developers, platforms, complements, and networked relationships.",
        simple: "A way to think about how software works with other players, not by itself.",
        example: "A phone platform becomes stronger when more app makers, users, and service partners join the ecosystem."
    },
    {
        term: "Middleware",
        exact: "Software that connects different applications, systems, or databases so they can communicate and exchange data.",
        simple: "Software that helps other software talk to each other.",
        example: "A school website sends payment data to the billing system through middleware."
    },
    {
        term: "Operating systems",
        exact: "Core software that manages hardware resources and provides services for applications.",
        simple: "The main software that runs a computer or phone and lets apps work.",
        example: "Windows, macOS, iOS, and Android are operating systems."
    },
    {
        term: "Supply Chain Management (SCM) systems",
        exact: "Systems that coordinate the flow of materials, information, and products across suppliers, manufacturers, warehouses, and retailers.",
        simple: "Systems that help businesses move products from suppliers to customers.",
        example: "An apparel brand uses SCM software to monitor factory output, shipments, and store inventory."
    },
    {
        term: "User Interface and graphical user interface (GUI)",
        exact: "The user interface is the way a person interacts with a system; a GUI is a visual interface that uses windows, icons, menus, and buttons.",
        simple: "The part of a system people see and use, especially visual screens and buttons.",
        example: "A food delivery app uses a GUI so customers can tap pictures, menus, and maps."
    }
];

const quizData = [
    {
        scenario: "A student organization at UT sells event tickets online. One officer tracks buyers in a spreadsheet, another answers questions in email, and a third keeps refund notes in a separate app. Because the information is split across places, the team often misses follow-ups and repeat buyers feel ignored.",
        question: "Which system would MOST directly fix this problem?",
        options: [
            "A. A CRM system that keeps customer interactions together",
            "B. An SCM system that tracks supplier shipments and inventory",
            "C. An operating system that manages laptop files and memory",
            "D. A GUI that makes the screen easier to look at"
        ],
        correct: 0,
        explanation: "A CRM system is correct because the problem is managing customer interactions, follow-ups, and service history in one place. B is wrong because SCM focuses on the movement of goods through the supply chain. C is wrong because an operating system manages the computer, not customer relationships. D is wrong because a nicer interface does not solve the issue of scattered customer data."
    },
    {
        scenario: "A small clothing startup uses one shared system for payroll, inventory, purchasing, and accounting. When a sale happens, inventory updates immediately and the finance team can see the revenue without waiting for another department to email a spreadsheet. Managers say this system reduced duplicate work and conflicting numbers.",
        question: "Which concept BEST describes the system in this scenario?",
        options: [
            "A. BI system because it mainly creates reports for managers",
            "B. ERP system because it integrates major business functions",
            "C. DBMS because it only stores raw data in tables",
            "D. Middleware because it translates data between separate tools"
        ],
        correct: 1,
        explanation: "An ERP system is correct because it connects major business functions like inventory, purchasing, payroll, and accounting in one platform. A is wrong because BI focuses on analysis and reporting, not full process integration. C is wrong because a DBMS manages data, but the scenario shows a broader business system. D is wrong because middleware links separate systems, while this scenario highlights one shared integrated system."
    },
    {
        scenario: "A student-made resale app keeps slowing down during move-out week when many users search at once. The developers solve the issue by spreading the work across several servers instead of forcing one machine to handle everything. After that, the app becomes faster and more reliable.",
        question: "Which concept MOST directly explains that improvement?",
        options: [
            "A. Middleware because different apps are now connected",
            "B. Distributed computing because the workload is shared across machines",
            "C. GUI because the app has clearer menus and buttons",
            "D. CRM because users can message sellers more easily"
        ],
        correct: 1,
        explanation: "Distributed computing is correct because the main change is sharing work across multiple computers or servers. A is wrong because middleware is about helping systems communicate, not mainly about load sharing. C is wrong because the scenario is about speed and capacity, not screen design. D is wrong because customer relationship tools are unrelated to the performance issue described."
    },
    {
        scenario: "A local business has separate software for online orders, billing, and shipping. Each tool works well on its own, but order details often fail to move smoothly from one system to another. The company adds a software layer that helps these systems exchange information automatically.",
        question: "Which technology did the company MOST likely add?",
        options: [
            "A. A BI system that makes dashboards from order data",
            "B. A DBMS that stores customer records in a database",
            "C. Middleware that helps different systems communicate",
            "D. An operating system that controls processor time"
        ],
        correct: 2,
        explanation: "Middleware is correct because it helps separate systems communicate and exchange data. A is wrong because BI systems focus on analysis, not integration. B is wrong because a DBMS manages stored data, but the main problem here is movement of information between systems. D is wrong because operating systems manage hardware resources, not business software integration."
    },
    {
        scenario: "A retail manager checks a dashboard every morning to compare sales by store, profit by product category, and changes in weekly demand. She uses the reports to decide staffing, promotions, and which items need more attention. The system does not run payroll or customer service; it mainly helps her analyze data and make better decisions.",
        question: "Which concept BEST matches the system she is using?",
        options: [
            "A. GUI because it uses charts, buttons, and menus",
            "B. SCM system because it manages product flow to stores",
            "C. CRM system because it keeps customer history together",
            "D. BI system because it supports analysis and decision making"
        ],
        correct: 3,
        explanation: "A BI system is correct because the system's main job is to analyze data and support decisions through dashboards and reports. A is wrong because GUI describes the visual interface, not the business purpose of the system. B is wrong because SCM focuses on supply chain coordination rather than decision analysis. C is wrong because CRM is about customer relationships, which is not the main function in this scenario."
    }
];

function showTab(id, el) {
    document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

function renderVocab() {
    const container = document.getElementById('vocab-container');
    container.innerHTML = vocabData.map(item => `
        <div class="vocab-card">
            <h3>${item.term}</h3>
            <span class="label">Exact Definition</span>
            <p>${item.exact}</p>
            <span class="label">Simple Definition</span>
            <p>${item.simple}</p>
            <div class="example-box">
                <span class="label" style="margin-top:0">Example</span>
                ${item.example}
            </div>
        </div>
    `).join('');
}

function filterVocab() {
    const query = document.getElementById('search').value.toLowerCase();
    const cards = document.querySelectorAll('.vocab-card');
    cards.forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(query) ? 'block' : 'none';
    });
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = quizData.map((item, i) => `
        <div class="q-card" id="q${i}">
            <div class="q-number">${i + 1}.</div>
            <p class="scenario">${item.scenario}</p>
            <p class="question-line">${item.question}</p>
            ${item.options.map((opt, oi) => `
                <button class="option" onclick="checkAnswer(${i}, ${oi})">${opt}</button>
            `).join('')}
            <div class="answer-block" id="exp${i}">
                <p><strong>Correct answer:</strong> ${String.fromCharCode(65 + item.correct)}</p>
                <p><strong>Explanation:</strong> ${item.explanation}</p>
            </div>
        </div>
    `).join('');
}

function checkAnswer(qIdx, oIdx) {
    const q = quizData[qIdx];
    const card = document.getElementById(`q${qIdx}`);
    const options = card.querySelectorAll('.option');
    const exp = document.getElementById(`exp${qIdx}`);

    options.forEach(btn => btn.disabled = true);

    if (oIdx === q.correct) {
        options[oIdx].classList.add('correct');
        exp.style.background = "rgba(35, 134, 54, 0.12)";
    } else {
        options[oIdx].classList.add('wrong');
        options[q.correct].classList.add('correct');
        exp.style.background = "rgba(218, 54, 51, 0.12)";
    }

    exp.style.display = "block";
}

renderVocab();
renderQuiz();
</script>

</body>
</html>
